<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="EGU 영단어 마스터 - 초등학생을 위한 인터랙티브 영어 단어 학습 앱">
  <meta name="theme-color" content="#6C5CE7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EGU 영단어">
  <title>EGU 영단어 마스터</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Jua&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/learn.css">
  <link rel="stylesheet" href="css/test.css">
  <link rel="stylesheet" href="css/review.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-hero">
        <div class="login-mascot">📚</div>
        <h1 class="login-title">EGU 영단어 마스터</h1>
        <p class="login-subtitle">재미있게 영어 단어를 배워요!</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label for="student-name">이름</label>
          <input type="text" id="student-name" placeholder="이름을 입력하세요" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="class-code">반 코드</label>
          <input type="text" id="class-code" placeholder="선생님이 알려준 코드" autocomplete="off">
        </div>
        <button id="login-btn" class="btn btn-primary btn-lg">
          🚀 시작하기
        </button>
        <div id="saved-profiles" class="saved-profiles"></div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app-container" class="hidden">
    <!-- Header -->
    <header id="app-header">
      <button id="back-btn" class="header-btn hidden" aria-label="뒤로가기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 id="header-title">EGU 영단어</h1>
      <button id="profile-btn" class="header-btn" aria-label="프로필">
        <span id="profile-avatar">😊</span>
      </button>
    </header>

    <!-- Screens Container -->
    <main id="main-content">
      <!-- Dashboard -->
      <div id="dashboard-screen" class="screen"></div>
      
      <!-- Unit Select -->
      <div id="unit-select-screen" class="screen"></div>
      
      <!-- Learn Mode -->
      <div id="learn-screen" class="screen"></div>
      
      <!-- Test Setup -->
      <div id="test-setup-screen" class="screen"></div>
      
      <!-- Test Mode -->
      <div id="test-screen" class="screen"></div>
      
      <!-- Test Result -->
      <div id="test-result-screen" class="screen"></div>
      
      <!-- Review (오답노트) -->
      <div id="review-screen" class="screen"></div>

      <!-- Profile -->
      <div id="profile-screen" class="screen"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <button class="nav-item active" data-screen="dashboard">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">홈</span>
      </button>
      <button class="nav-item" data-screen="unit-select">
        <span class="nav-icon">📚</span>
        <span class="nav-label">학습</span>
      </button>
      <button class="nav-item" data-screen="test-setup">
        <span class="nav-icon">📝</span>
        <span class="nav-label">시험</span>
      </button>
      <button class="nav-item" data-screen="review">
        <span class="nav-icon">📓</span>
        <span class="nav-label">오답</span>
      </button>
    </nav>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Profile Modal -->
  <div id="profile-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <h2>👤 내 프로필</h2>
      <div id="profile-info"></div>
      <div class="modal-actions">
        <button id="logout-btn" class="btn btn-secondary">🚪 로그아웃</button>
        <button id="close-profile-btn" class="btn btn-primary">확인</button>
      </div>
    </div>
  </div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>

  <!-- External Libraries -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/wordImages.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/learn.js"></script>
  <script src="js/test.js"></script>
  <script src="js/review.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
